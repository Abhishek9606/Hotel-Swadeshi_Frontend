<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Swadeshi - Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <!-- Icon sprite -->
    <svg aria-hidden="true" width="0" height="0" style="position:absolute; width:0; height:0; overflow:hidden">
        <symbol id="i-user" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M20 21a8 8 0 0 0-16 0"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M12 13a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"/>
        </symbol>
        <symbol id="i-package" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3.3 7l8.7 5 8.7-5"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M12 22V12"/>
        </symbol>
        <symbol id="i-bag" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M6 7h12l1 14H5L6 7Z"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 7a3 3 0 0 1 6 0"/>
        </symbol>
        <symbol id="i-search" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M11 19a8 8 0 1 1 8-8 8 8 0 0 1-8 8Z"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.3-4.3"/>
        </symbol>
        <symbol id="i-refresh" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 12a9 9 0 0 1 15.5-6.4"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M18 3v6h-6"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 0 1-15.5 6.4"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M6 21v-6h6"/>
        </symbol>
        <symbol id="i-sparkle" viewBox="0 0 24 24">
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M12 2l1.2 4.2L17 7.4l-3.8 1.2L12 13l-1.2-4.4L7 7.4l3.8-1.2L12 2Z"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M5 14l.7 2.4L8 17l-2.3.6L5 20l-.7-2.4L2 17l2.3-.6L5 14Z"/>
            <path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M19 13l.8 2.8L22 16.6l-2.2.6L19 20l-.8-2.8L16 16.6l2.2-.8L19 13Z"/>
        </symbol>
    </svg>
    <!-- Success Toast -->
    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <span class="toast-icon">&#10003;</span>
            <p id="toast-message"></p>
        </div>
    </div>

    <!-- Left Sidebar -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2><span class="brand-hotel">Hotel</span> <span class="brand-swadeshi">Swadeshi</span></h2>
            <button id="close-sidebar" class="close-sidebar">&times;</button>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-item" data-section="profile">
                <span class="nav-icon" aria-hidden="true"><svg class="icon"><use href="#i-user" /></svg></span>
                Profile
            </button>
            <button class="nav-item" data-section="orders">
                <span class="nav-icon" aria-hidden="true"><svg class="icon"><use href="#i-package" /></svg></span>
                My Orders
            </button>
            <button class="nav-item" data-section="cart">
                <span class="nav-icon" aria-hidden="true"><svg class="icon"><use href="#i-bag" /></svg></span>
                My Cart
                <span id="cart-count" class="cart-count hidden">0</span>
            </button>
        </nav>
    </aside>

    <!-- Sidebar Content Panels -->
    <div id="panel-overlay" class="panel-overlay hidden"></div>
    
    <!-- Profile Panel -->
    <div id="profile-panel" class="content-panel hidden">
        <div class="panel-header">
            <h3>Profile</h3>
            <button class="close-panel">&times;</button>
        </div>
        <div class="panel-body">
            <div class="profile-section">
                <div class="avatar-container">
                    <img id="profile-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=swadeshi" alt="Profile Avatar" class="profile-avatar">
                    <label for="avatar-upload" class="avatar-edit-btn">&#9998;</label>
                    <input type="file" id="avatar-upload" accept="image/*" hidden>
                </div>
                <div class="profile-info">
                    <div class="profile-name-display" id="name-display">
                        <h4 id="display-name">Swadeshi User</h4>
                        <button id="edit-profile-btn" class="edit-btn">Edit</button>
                    </div>
                    <div class="profile-name-edit hidden" id="name-edit">
                        <input type="text" id="swadeshi-name" placeholder="Enter your Swadeshi name" value="Swadeshi User">
                        <button id="save-profile-btn" class="save-btn">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Orders Panel -->
    <div id="orders-panel" class="content-panel hidden">
        <div class="panel-header">
            <h3>My Orders</h3>
            <button id="clear-orders-btn" class="clear-orders-btn hidden">Clear History</button>
            <button class="close-panel">&times;</button>
        </div>
        <div class="panel-body">
            <div id="orders-list" class="orders-list">
                <div class="empty-state">
                    <span class="empty-icon" aria-hidden="true"><svg class="icon icon-lg"><use href="#i-package" /></svg></span>
                    <p>Place an order to see it here.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Panel -->
    <div id="cart-panel" class="content-panel hidden">
        <div class="panel-header">
            <h3>My Cart</h3>
            <button class="close-panel">&times;</button>
        </div>
        <div class="panel-body">
            <div id="cart-list" class="cart-list">
                <div class="empty-state">
                    <span class="empty-icon" aria-hidden="true"><svg class="icon icon-lg"><use href="#i-bag" /></svg></span>
                    <p>Cart is empty.</p>
                </div>
            </div>
            <div id="cart-footer" class="cart-footer hidden">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cart-total-amount">₹0</span>
                </div>
                <button id="place-order-btn" class="place-order-btn">Place Order</button>
            </div>
        </div>
    </div>

    <!-- Food Detail Modal -->
    <div id="food-modal" class="food-modal hidden">
        <div class="modal-content">
            <button id="close-modal" class="close-modal">&times;</button>
            <div class="modal-body">
                <div class="modal-image-container">
                    <img id="modal-food-image" src="" alt="Food Image" class="modal-food-image">
                </div>
                <div class="modal-info">
                    <div class="modal-header-info">
                        <h2 id="modal-food-name"></h2>
                        <span id="modal-food-type" class="food-type-badge"></span>
                    </div>
                    <p id="modal-food-price" class="modal-price"></p>
                    <p id="modal-food-description" class="modal-description"></p>
                    <div class="modal-ingredients">
                        <h4>Ingredients & Serving Style</h4>
                        <p id="modal-food-ingredients"></p>
                    </div>
                    <button id="modal-add-cart" class="add-to-cart-btn">Add To Cart</button>
                </div>
            </div>
            
            <!-- Reviews Section -->
            <div class="reviews-section">
                <div class="reviews-header">
                    <h3>What our <strong>Swadeshis</strong> say about this item?</h3>
                    <button id="refresh-reviews" class="refresh-reviews-btn">
                        <span class="refresh-icon" aria-hidden="true"><svg class="icon"><use href="#i-refresh" /></svg></span>
                        Refresh Customer Reviews
                    </button>
                </div>
                <div id="reviews-container" class="reviews-container">
                    <!-- Reviews will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <button id="menu-toggle" class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <h1 class="logo brand-title">Explore our rich menu!</h1>
            <div class="header-actions">
                <button id="header-cart" class="header-cart">
                    <span class="cart-icon" aria-hidden="true"><svg class="icon"><use href="#i-bag" /></svg></span>
                    <span id="header-cart-count" class="header-cart-count hidden">0</span>
                </button>
            </div>
        </header>

        <!-- Search and Filters -->
        <section class="search-filter-section">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search for foods...">
                <span class="search-icon" aria-hidden="true"><svg class="icon"><use href="#i-search" /></svg></span>
            </div>
            <div class="filters-container">
                <div class="filter-group">
                    <label>Type:</label>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="veg">
                            <span class="veg-indicator"></span>Veg
                        </button>
                        <button class="filter-btn" data-filter="non-veg">
                            <span class="non-veg-indicator"></span>Non-Veg
                        </button>
                    </div>
                </div>
                <div class="filter-group">
                    <label>Price:</label>
                    <select id="price-filter" class="price-filter">
                        <option value="all">All Prices</option>
                        <option value="0-100">Under ₹100</option>
                        <option value="100-200">₹100 - ₹200</option>
                        <option value="200-500">₹200 - ₹500</option>
                        <option value="500+">Above ₹500</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Sort:</label>
                    <select id="popularity-filter" class="popularity-filter">
                        <option value="default">Default</option>
                        <option value="popular">Most Popular</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Food Grid -->
        <section class="food-grid-section">
            <div id="food-grid" class="food-grid">
                <!-- Food cards will be rendered here -->
            </div>
            <div id="no-results" class="no-results hidden">
                <span class="empty-icon" aria-hidden="true"><svg class="icon icon-lg"><use href="#i-sparkle" /></svg></span>
                <p>No foods match your search criteria.</p>
            </div>
        </section>
    </main>

    <script src="home.js?v=2"></script>
</body>
</html>
